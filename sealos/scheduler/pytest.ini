[pytest]
testpaths = tests
python_files = test_*.py
asyncio_mode = auto
addopts = -ra -q --strict-markers
# 把仓库根加入 PYTHONPATH，使得 `from sealos.scheduler.xxx import ...` 在
# 直接 cd sealos/scheduler && pytest 时也能 import（sealos 是 PEP 420 命名空间包）
pythonpath = ../..
markers =
    slow: 标记会真实访问外部服务的慢用例（CI 默认跳过）
